<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #555;
    --muted2: #888;
    --danger: #ff3b3b;
    --green: #39ff6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(232,255,0,0.3);
  }

  .logo span { color: var(--muted2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .date-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 8px;
    padding: 4px;
  }

  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* MAIN LAYOUT */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* ========== TODAY VIEW ========== */
  .today-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .today-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    line-height: 1;
    letter-spacing: 3px;
  }

  .today-title span {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Quick stat chips */
  .stat-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted2);
    letter-spacing: 1px;
  }

  .chip strong { color: var(--accent); }

  /* WORKOUT CARD */
  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .workout-card:hover { border-color: #3a3a3a; }

  .workout-card-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .workout-card-header:hover { background: var(--surface2); }

  .exercise-name-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    outline: none;
    cursor: text;
  }

  .exercise-name-input::placeholder { color: var(--muted); }

  .muscle-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(232,255,0,0.08);
    color: var(--accent);
    border: 1px solid rgba(232,255,0,0.2);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .muscle-tag:hover { background: rgba(232,255,0,0.15); }

  .card-toggle {
    color: var(--muted);
    font-size: 1rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .card-toggle.open { transform: rotate(180deg); }

  .workout-card-body {
    padding: 0 20px 16px;
    border-top: 1px solid var(--border);
  }

  /* SET TABLE */
  .set-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
    margin-top: 12px;
  }

  .set-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 8px 8px;
    border-bottom: 1px solid var(--border);
  }

  .set-table th:first-child { width: 40px; }
  .set-table th:last-child { width: 80px; text-align: right; }

  .set-row td {
    padding: 6px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }

  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }

  .set-input {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 6px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }

  .set-input:focus { border-color: var(--accent); }
  .set-input.done-input { color: var(--green); }

  .set-row.completed td { background: rgba(57,255,110,0.03); }

  .check-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--muted);
    font-size: 0.8rem;
    margin: auto;
  }

  .check-btn.done {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
    display: block;
    margin: auto;
  }

  .del-btn:hover { color: var(--danger); background: rgba(255,59,59,0.1); }

  .add-set-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 1px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
  }

  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  .note-input {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--muted2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    margin-top: 10px;
    height: 60px;
  }

  .note-input:focus { border-color: var(--border); color: var(--text); }
  .note-input::placeholder { color: var(--muted); }

  .card-del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .card-del-btn:hover { color: var(--danger); }

  /* ADD EXERCISE */
  .add-exercise-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }

  .add-exercise-zone:hover {
    border-color: var(--accent);
    background: rgba(232,255,0,0.03);
  }

  .add-exercise-zone span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    color: var(--muted2);
  }

  .add-exercise-zone:hover span { color: var(--accent); }

  /* FINISH WORKOUT BTN */
  .finish-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 4px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .finish-btn:hover {
    background: #fff;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(232,255,0,0.2);
  }

  .finish-btn:active { transform: translateY(0); }

  /* EXERCISE PICKER MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    flex: 1;
  }

  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--muted2);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    margin: 16px 24px;
    width: calc(100% - 48px);
    transition: border-color 0.2s;
  }

  .modal-search:focus { border-color: var(--accent); }
  .modal-search::placeholder { color: var(--muted); }

  .modal-body { overflow-y: auto; padding: 0 24px 24px; flex: 1; }

  .muscle-section { margin-bottom: 20px; }

  .muscle-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .exercise-option {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .exercise-option:hover {
    background: var(--surface2);
    color: var(--accent);
  }

  .exercise-option::before {
    content: '+';
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .exercise-option:hover::before { color: var(--accent); }

  /* ========== HISTORY VIEW ========== */
  .history-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 3px;
    line-height: 1;
  }

  .section-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.6;
  }

  .clear-btn:hover { opacity: 1; background: rgba(255,59,59,0.1); }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    cursor: pointer;
    animation: slideIn 0.3s ease;
  }

  .history-item:hover { border-color: #3a3a3a; }

  .history-item-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }

  .history-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .history-date-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted2);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .history-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .history-exercises {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .history-ex-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted2);
    border: 1px solid var(--border);
  }

  .history-ex-tag strong { color: var(--text); }

  .history-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .history-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ========== STATS VIEW ========== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .stat-unit {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted2);
    margin-top: 4px;
  }

  .freq-bars { margin-top: 16px; }

  .freq-day {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .freq-day-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--muted2);
    width: 26px;
    text-transform: uppercase;
  }

  .freq-bar-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .freq-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .freq-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted2);
    width: 20px;
    text-align: right;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* DETAIL MODAL */
  .detail-modal .modal {
    border-radius: 16px;
    max-width: 560px;
    width: calc(100% - 32px);
    max-height: 85vh;
    margin-bottom: 0;
    border-radius: 16px;
  }

  .detail-modal {
    align-items: center;
  }

  .detail-set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .detail-set-num {
    width: 24px;
    color: var(--muted);
    font-size: 0.7rem;
  }

  .detail-ex-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    margin: 20px 0 8px;
    color: var(--text);
  }

  .detail-vol-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    letter-spacing: 1px;
  }

  /* QUOTE BANNER */
  .quote-banner {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    background: linear-gradient(135deg, rgba(232,255,0,0.03) 0%, transparent 60%);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: fadeQuote 0.8s ease;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .quote-banner:hover {
    border-color: rgba(232,255,0,0.5);
    background: linear-gradient(135deg, rgba(232,255,0,0.06) 0%, transparent 60%);
  }

  @keyframes fadeQuote {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .quote-icon {
    font-size: 1.4rem;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.5;
    margin-top: 2px;
  }

  .quote-text {
    flex: 1;
  }

  .quote-text blockquote {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 6px;
  }

  .quote-text cite {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-style: normal;
  }

  .quote-refresh {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;

  .complete-overlay {

  .complete-quote {

    font-style: italic;

  .complete-close {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;

  }

  .complete-close:hover { background: #fff; }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 14px 16px; }

</style>
</head>

<script>
// ============================================================
//  DATA LAYER — localStorage persistence
// ============================================================
const LS_TODAY   = 'ironlog_today';
const LS_HISTORY = 'ironlog_history';

function loadToday() {
  try { return JSON.parse(localStorage.getItem(LS_TODAY)) || createFreshSession(); }
  catch { return createFreshSession(); }
}

function saveToday(session) {
  localStorage.setItem(LS_TODAY, JSON.stringify(session));
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY)) || []; }
  catch { return []; }
}

function saveHistory(hist) {
  localStorage.setItem(LS_HISTORY, JSON.stringify(hist));
}

function createFreshSession() {
  return { date: todayKey(), exercises: [] };
}

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

// ============================================================
//  EXERCISE DATABASE
// ============================================================
const EXERCISE_DB = {
  'Chest': ['Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Fly','Cable Fly','Push-Up','Chest Dip'],
  'Back': ['Pull-Up','Barbell Row','Seated Cable Row','Lat Pulldown','Deadlift','T-Bar Row','Face Pull'],
  'Shoulders': ['Overhead Press','Dumbbell Lateral Raise','Front Raise','Arnold Press','Rear Delt Fly','Shrug'],
  'Biceps': ['Barbell Curl','Dumbbell Curl','Hammer Curl','Preacher Curl','Cable Curl','Concentration Curl'],
  'Triceps': ['Skull Crusher','Tricep Dip','Close Grip Bench','Cable Pushdown','Overhead Extension','Diamond Push-Up'],
  'Legs': ['Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Lunges','Calf Raise','Hip Thrust'],
  'Core': ['Plank','Crunch','Leg Raise','Cable Crunch','Russian Twist','Ab Rollout'],
  'Cardio': ['Running','Cycling','Jump Rope','Rowing Machine','Stair Climber','HIIT'],
};

const MUSCLE_MAP = {};
Object.entries(EXERCISE_DB).forEach(([muscle, exs]) => exs.forEach(e => MUSCLE_MAP[e] = muscle));

// ============================================================
//  APP STATE
// ============================================================
let session = loadToday();

// If date changed since last save, archive old session if it has data
(function checkDateRollover() {
  if (session.date !== todayKey()) {
    if (session.exercises.length > 0) {
      archiveSession(session);
    }
    session = createFreshSession();
    saveToday(session);
  }
})();

// ============================================================
//  RENDERING HELPERS
// ============================================================
function renderHeader() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();

  const day = now.toLocaleDateString('en-US', {weekday:'long'}).toUpperCase();
  document.getElementById('sessionTitle').textContent = day;
}

function updateTodayStats() {
  let sets = 0, volume = 0;
  session.exercises.forEach(ex => {
    ex.sets.forEach(s => {
      if (s.done) { sets++; volume += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0); }
    });
  });
  document.getElementById('todaySets').textContent = sets;
  document.getElementById('todayVolume').textContent = volume.toLocaleString();
  document.getElementById('todayExCount').textContent = session.exercises.length;
}

// ============================================================
//  TODAY RENDER
// ============================================================
function renderToday() {
  const container = document.getElementById('exerciseContainer');
  container.innerHTML = '';
  session.exercises.forEach((ex, idx) => {
    container.appendChild(buildExerciseCard(ex, idx));
  });
  updateTodayStats();
}

function buildExerciseCard(ex, idx) {
  const card = document.createElement('div');
  card.className = 'workout-card';
  card.id = `card-${idx}`;

  const muscle = ex.muscle || MUSCLE_MAP[ex.name] || '';
  const allDone = ex.sets.length > 0 && ex.sets.every(s => s.done);

  card.innerHTML = `
    <div class="workout-card-header" onclick="toggleCard(${idx})">
      <input class="exercise-name-input" value="${escHtml(ex.name)}" placeholder="Exercise name…"
        onclick="event.stopPropagation()"
        onchange="renameExercise(${idx}, this.value)">
      ${muscle ? `<span class="muscle-tag">${muscle}</span>` : ''}
      <button class="card-del-btn" onclick="removeExercise(event,${idx})">✕</button>
      <span class="card-toggle ${ex.open!==false?'open':''}" id="toggle-${idx}">▾</span>
    </div>
    <div class="workout-card-body" id="body-${idx}" style="display:${ex.open!==false?'block':'none'}">
      <table class="set-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Weight (kg)</th>
            <th>Reps</th>
            <th>✓</th>
            <th style="text-align:right">Del</th>
          </tr>
        </thead>
        <tbody id="sets-${idx}">
        </tbody>
      </table>
      <button class="add-set-btn" onclick="addSet(${idx})">+ Add Set</button>
      <textarea class="note-input" placeholder="Notes…" onchange="updateNote(${idx}, this.value)">${escHtml(ex.note||'')}</textarea>
    </div>`;

  // Render sets
  const tbody = card.querySelector(`#sets-${idx}`);
  ex.sets.forEach((s, si) => {
    tbody.appendChild(buildSetRow(idx, si, s));
  });

  return card;
}

function buildSetRow(exIdx, setIdx, s) {
  const tr = document.createElement('tr');
  tr.className = `set-row${s.done?' completed':''}`;
  tr.id = `set-${exIdx}-${setIdx}`;
  tr.innerHTML = `
    <td><span class="set-num">${setIdx+1}</span></td>
    <td><input class="set-input${s.done?' done-input':''}" type="number" min="0" step="0.5"
      value="${s.weight||''}" placeholder="0"
      onchange="updateSet(${exIdx},${setIdx},'weight',this.value)"></td>
    <td><input class="set-input${s.done?' done-input':''}" type="number" min="0" step="1"
      value="${s.reps||''}" placeholder="0"
      onchange="updateSet(${exIdx},${setIdx},'reps',this.value)"></td>
    <td><button class="check-btn${s.done?' done':''}"
      onclick="toggleSetDone(${exIdx},${setIdx})">✓</button></td>
    <td><button class="del-btn" onclick="removeSet(${exIdx},${setIdx})">✕</button></td>`;
  return tr;
}

function toggleCard(idx) {
  session.exercises[idx].open = session.exercises[idx].open === false ? true : false;
  const body = document.getElementById(`body-${idx}`);
  const tog = document.getElementById(`toggle-${idx}`);
  const isOpen = session.exercises[idx].open !== false;
  body.style.display = isOpen ? 'block' : 'none';
  tog.classList.toggle('open', isOpen);
  saveToday(session);
}

function renameExercise(idx, val) {
  session.exercises[idx].name = val;
  const muscle = MUSCLE_MAP[val] || session.exercises[idx].muscle || '';
  session.exercises[idx].muscle = muscle;
  saveToday(session);
  updateTodayStats();
  // update muscle tag
  const card = document.getElementById(`card-${idx}`);
  const existing = card.querySelector('.muscle-tag');
  if (existing) existing.textContent = muscle;
}

function addSet(idx) {
  session.exercises[idx].sets.push({weight:'', reps:'', done:false});
  saveToday(session);
  const tbody = document.getElementById(`sets-${idx}`);
  const si = session.exercises[idx].sets.length - 1;
  tbody.appendChild(buildSetRow(idx, si, session.exercises[idx].sets[si]));
  updateTodayStats();
}

function updateSet(exIdx, setIdx, field, val) {
  session.exercises[exIdx].sets[setIdx][field] = val;
  saveToday(session);
  updateTodayStats();
}

function toggleSetDone(exIdx, setIdx) {
  const s = session.exercises[exIdx].sets[setIdx];
  s.done = !s.done;
  saveToday(session);
  updateTodayStats();
  // Rebuild the row
  const row = document.getElementById(`set-${exIdx}-${setIdx}`);
  const newRow = buildSetRow(exIdx, setIdx, s);
  newRow.id = `set-${exIdx}-${setIdx}`;
  row.replaceWith(newRow);
}

function removeSet(exIdx, setIdx) {
  session.exercises[exIdx].sets.splice(setIdx, 1);
  saveToday(session);
  // re-render just this card
  const card = document.getElementById(`card-${exIdx}`);
  const newCard = buildExerciseCard(session.exercises[exIdx], exIdx);
  card.replaceWith(newCard);
  updateTodayStats();
}

function updateNote(idx, val) {
  session.exercises[idx].note = val;
  saveToday(session);
}

function removeExercise(e, idx) {
  e.stopPropagation();
  session.exercises.splice(idx, 1);
  saveToday(session);
  renderToday();
}

// ============================================================
//  EXERCISE PICKER
// ============================================================
function openExercisePicker() {
  document.getElementById('pickerModal').classList.add('open');
  document.getElementById('exerciseSearch').value = '';
  renderExerciseList('');
  setTimeout(() => document.getElementById('exerciseSearch').focus(), 100);
}

function closeExercisePicker() {
  document.getElementById('pickerModal').classList.remove('open');
}

function renderExerciseList(filter) {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  const q = filter.toLowerCase();

  Object.entries(EXERCISE_DB).forEach(([muscle, exercises]) => {
    const filtered = exercises.filter(e => e.toLowerCase().includes(q) || muscle.toLowerCase().includes(q));
    if (filtered.length === 0) return;

    const section = document.createElement('div');
    section.className = 'muscle-section';
    section.innerHTML = `<div class="muscle-section-title">${muscle}</div>`;
    filtered.forEach(ex => {
      const opt = document.createElement('div');
      opt.className = 'exercise-option';
      opt.textContent = ex;
      opt.onclick = () => addExercise(ex, muscle);
      section.appendChild(opt);
    });
    list.appendChild(section);
  });

  // Custom add
  if (filter.length > 1) {
    const custom = document.createElement('div');
    custom.className = 'muscle-section';
    custom.innerHTML = `<div class="muscle-section-title">Custom</div>`;
    const opt = document.createElement('div');
    opt.className = 'exercise-option';
    opt.textContent = `Add "${filter}"`;
    opt.onclick = () => addExercise(filter, '');
    custom.appendChild(opt);
    list.appendChild(custom);
  }
}

function filterExercises(val) { renderExerciseList(val); }

function addExercise(name, muscle) {
  session.exercises.push({ name, muscle, sets: [], note: '', open: true });
  saveToday(session);
  renderToday();
  closeExercisePicker();
  showToast(`${name} added`);
}

// ============================================================
//  CONFETTI ENGINE
// ============================================================
const confettiCanvas = document.getElementById('confettiCanvas');
const ctx = confettiCanvas.getContext('2d');
let confettiParticles = [];
let confettiRAF = null;

const CONFETTI_COLORS = ['#e8ff00','#ff4d00','#39ff6e','#00c8ff','#ff3bff','#ffffff','#ffcc00'];

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnConfetti(count = 160) {
  confettiParticles = [];
  for (let i = 0; i < count; i++) {
    confettiParticles.push({
      x: Math.random() * confettiCanvas.width,
      y: -10 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 5,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.25,
      opacity: 1,
      life: 180 + Math.floor(Math.random() * 120),
      age: 0,
      shape: Math.random() > 0.4 ? 'rect' : 'circle',
    });
  }
}

function animateConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => p.age < p.life);

  confettiParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.07; // gravity
    p.vx *= 0.99;
    p.angle += p.spin;
    p.age++;
    p.opacity = p.age > p.life * 0.7 ? 1 - (p.age - p.life * 0.7) / (p.life * 0.3) : 1;

    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;

    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.restore();
  });

  if (confettiParticles.length > 0) {
    confettiRAF = requestAnimationFrame(animateConfetti);
  } else {
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    confettiRAF = null;
  }
}

function launchConfetti() {
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  spawnConfetti(180);
  // Second burst after 400ms
  setTimeout(() => { spawnConfetti(120); confettiParticles.push(...confettiParticles); }, 400);
  animateConfetti();
}

// ============================================================
//  FINISH WORKOUT
// ============================================================
function finishWorkout() {
  if (session.exercises.length === 0) { showToast('Add exercises first!'); return; }

  // Gather stats before archiving
  let totalSets = 0, totalVol = 0;
  session.exercises.forEach(ex => ex.sets.forEach(s => {
    if (s.done) { totalSets++; totalVol += (parseFloat(s.weight)||0)*(parseInt(s.reps)||0); }
  }));

  archiveSession(session);
  session = createFreshSession();
  saveToday(session);
  renderToday();
  renderHistory();
  renderStats();

  // Show complete overlay
  showCompleteOverlay(session.exercises.length || totalSets, totalSets, totalVol);
}

function archiveSession(s) {
  if (s.exercises.length === 0) return;
  const hist = loadHistory();
  hist.unshift({
    id: Date.now(),
    date: s.date,
    savedAt: new Date().toISOString(),
    exercises: JSON.parse(JSON.stringify(s.exercises))
  });
  saveHistory(hist);
}

function showCompleteOverlay(exCount, sets, volume) {
  const now = new Date();
  document.getElementById('completeDate').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'}).toUpperCase();

  document.getElementById('completeStats').innerHTML = `
    <div class="complete-stat"><div class="complete-stat-val">${exCount}</div><div class="complete-stat-label">Exercises</div></div>
    <div class="complete-stat"><div class="complete-stat-val">${sets}</div><div class="complete-stat-label">Sets Done</div></div>
    ${volume > 0 ? `<div class="complete-stat"><div class="complete-stat-val">${volume >= 1000 ? (volume/1000).toFixed(1)+'k' : volume}</div><div class="complete-stat-label">kg Volume</div></div>` : ''}
  `;

  const q = getRandomQuote();
  document.getElementById('completeQuote').textContent = `"${q.text}" — ${q.author}`;

  const overlay = document.getElementById('completeOverlay');
  overlay.classList.add('show');

  // Confetti after a tiny delay so the card animation plays first
  setTimeout(launchConfetti, 200);
}

function closeCompleteOverlay() {
  document.getElementById('completeOverlay').classList.remove('show');
  if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
}

// ============================================================
//  HISTORY VIEW
// ============================================================
function renderHistory() {
  const hist = loadHistory();
  const c = document.getElementById('historyContainer');
  c.innerHTML = '';

  if (hist.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">🏋️</div><p>No workouts logged yet</p></div>`;
    return;
  }

  hist.forEach((entry, i) => {
    const d = new Date(entry.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    const yearStr = d.getFullYear();
    let totalSets = 0, totalVol = 0;
    entry.exercises.forEach(ex => ex.sets.forEach(s => {
      if (s.done) { totalSets++; totalVol += (parseFloat(s.weight)||0)*(parseInt(s.reps)||0); }
    }));

    const el = document.createElement('div');
    el.className = 'history-item';
    el.onclick = () => openDetail(entry);
    el.innerHTML = `
      <div class="history-item-header">
        <div>
          <div class="history-date">${dateStr}</div>
          <div class="history-date-sub">${yearStr} · ${entry.exercises.length} exercises · ${totalSets} sets</div>
        </div>
        <div class="history-meta">
          ${totalVol > 0 ? `<span class="chip">Vol: <strong>${totalVol.toLocaleString()}</strong> kg</span>` : ''}
          <button class="history-del" onclick="deleteEntry(event,${entry.id})">✕</button>
        </div>
      </div>
      <div class="history-exercises">
        ${entry.exercises.map(ex =>
          `<span class="history-ex-tag"><strong>${escHtml(ex.name)}</strong> ${ex.sets.filter(s=>s.done).length}×</span>`
        ).join('')}
      </div>`;
    c.appendChild(el);
  });
}

function deleteEntry(e, id) {
  e.stopPropagation();
  let hist = loadHistory();
  hist = hist.filter(h => h.id !== id);
  saveHistory(hist);
  renderHistory();
  renderStats();
  showToast('Session deleted');
}

function clearHistory() {
  if (!confirm('Delete all workout history?')) return;
  saveHistory([]);
  renderHistory();
  renderStats();
  showToast('History cleared');
}

function openDetail(entry) {
  const d = new Date(entry.date + 'T12:00:00');
  document.getElementById('detailModalTitle').textContent =
    d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric', year:'numeric'}).toUpperCase();

  const body = document.getElementById('detailModalBody');
  body.innerHTML = '';

  entry.exercises.forEach(ex => {
    const exDiv = document.createElement('div');
    let vol = 0;
    ex.sets.forEach(s => { if(s.done) vol += (parseFloat(s.weight)||0)*(parseInt(s.reps)||0); });

    exDiv.innerHTML = `<div class="detail-ex-header">${escHtml(ex.name)} <span class="detail-vol-badge">${vol > 0 ? vol+'kg vol' : ''}</span></div>`;

    ex.sets.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'detail-set-row';
      row.style.color = s.done ? 'var(--green)' : 'var(--muted2)';
      row.innerHTML = `<span class="detail-set-num">${i+1}</span>
        <span>${s.weight||'—'} kg</span>
        <span style="margin-left:8px;color:var(--muted)">×</span>
        <span style="margin-left:8px">${s.reps||'—'} reps</span>
        ${s.done ? '<span style="margin-left:auto;font-size:0.7rem;color:var(--green)">✓</span>' : ''}`;
      exDiv.appendChild(row);
    });

    if (ex.note) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.8rem;color:var(--muted2);margin-top:8px;font-style:italic;padding:8px 0;';
      note.textContent = ex.note;
      exDiv.appendChild(note);
    }

    body.appendChild(exDiv);
  });

  document.getElementById('detailModal').classList.add('open');
}

// ============================================================
//  STATS VIEW
// ============================================================
function renderStats() {
  const hist = loadHistory();
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';

  const totalWorkouts = hist.length;
  let totalSets = 0, totalVolume = 0;
  const exerciseCounts = {};
  const dayOfWeekCounts = {Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0};

  hist.forEach(entry => {
    const d = new Date(entry.date + 'T12:00:00');
    const day = d.toLocaleDateString('en-US', {weekday:'short'});
    if (dayOfWeekCounts.hasOwnProperty(day)) dayOfWeekCounts[day]++;

    entry.exercises.forEach(ex => {
      const name = ex.name;
      if (!exerciseCounts[name]) exerciseCounts[name] = 0;
      exerciseCounts[name]++;
      ex.sets.forEach(s => {
        if (s.done) {
          totalSets++;
          totalVolume += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
        }
      });
    });
  });

  const cards = [
    {label: 'Workouts', value: totalWorkouts, unit: 'sessions'},
    {label: 'Total Sets', value: totalSets, unit: 'completed'},
    {label: 'Total Volume', value: totalVolume.toLocaleString(), unit: 'kilograms lifted'},
    {label: 'Avg Sets/Workout', value: totalWorkouts ? (totalSets/totalWorkouts).toFixed(1) : '0', unit: 'per session'},
  ];

  cards.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-card';
    el.innerHTML = `<div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-unit">${c.unit}</div>`;
    grid.appendChild(el);
  });

  // Frequency chart
  const freq = document.getElementById('freqSection');
  const max = Math.max(...Object.values(dayOfWeekCounts), 1);
  freq.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;margin-bottom:16px">Workout Frequency by Day</div>
    <div class="freq-bars">
      ${Object.entries(dayOfWeekCounts).map(([day, count]) =>
        `<div class="freq-day">
          <span class="freq-day-label">${day}</span>
          <div class="freq-bar-track"><div class="freq-bar-fill" style="width:${Math.round((count/max)*100)}%"></div></div>
          <span class="freq-count">${count}</span>
        </div>`
      ).join('')}
    </div>`;

  // Top exercises
  const top = Object.entries(exerciseCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (top.length > 0) {
    const topDiv = document.createElement('div');
    topDiv.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:16px;';
    topDiv.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;margin-bottom:16px">Most Trained Exercises</div>
      ${top.map(([name, count], i) => `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--muted);width:28px">${i+1}</span>
          <span style="flex:1;font-size:0.9rem">${escHtml(name)}</span>
          <span style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--accent)">${count}×</span>
        </div>`
      ).join('')}`;
    document.getElementById('statsGrid').after(topDiv);
  }
}

// ============================================================
//  TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  event.target.classList.add('active');

  if (tab === 'history') renderHistory();
  if (tab === 'stats') renderStats();
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
//  UTILS
// ============================================================
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modals on overlay click
document.getElementById('pickerModal').addEventListener('click', function(e) {
  if (e.target === this) closeExercisePicker();
});
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ============================================================
//  INIT
// ============================================================
renderHeader();
renderExerciseList('');
renderToday();
renderQuote(getRandomQuote());
</script>
